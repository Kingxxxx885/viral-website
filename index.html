<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra 3D NFT Website</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  z-index: 10;
}

.navbar a {
  color: white;
  margin: 10px;
  text-decoration: none;
}

.hero {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  z-index: 5;
}

.btn {
  padding: 12px 25px;
  background: #00ffcc;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#">NFT</a>
  <a href="#">Contact</a>
</div>

<div class="hero">
  <h1>Ultra 3D NFT Experience 🚀</h1>
  <button class="btn" onclick="contact()">Hire Me</button>
</div>

<!-- THREE JS + LOADER -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
let light1 = new THREE.DirectionalLight(0xffffff, 1);
light1.position.set(5,5,5);
scene.add(light1);

let light2 = new THREE.AmbientLight(0x404040);
scene.add(light2);

camera.position.z = 3;

// LOAD 3D MODEL (FREE CDN MODEL)
let loader = new THREE.GLTFLoader();
let model;

loader.load(
  "https://modelviewer.dev/shared-assets/models/Astronaut.glb",
  function(gltf) {
    model = gltf.scene;
    scene.add(model);
    model.scale.set(1.5,1.5,1.5);
  }
);

// TOUCH / DRAG ROTATION
let isDragging = false;

document.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (isDragging && model) {
    model.rotation.y += e.movementX * 0.01;
    model.rotation.x += e.movementY * 0.01;
  }
});

// MOBILE TOUCH
document.addEventListener("touchmove", (e) => {
  if (model) {
    let touch = e.touches[0];
    model.rotation.y += touch.clientX * 0.00005;
    model.rotation.x += touch.clientY * 0.00005;
  }
});

// ANIMATION LOOP
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y += 0.002; // idle animation
    model.position.y = Math.sin(Date.now() * 0.002) * 0.1; // floating
  }

  renderer.render(scene, camera);
}
animate();

// CONTACT
function contact() {
  window.location.href = "https://wa.me/639XXXXXXXXX";
}
</script>

</body>
</html>
