<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D NFT Website</title>

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.6);
  z-index: 10;
}
.navbar a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  background: #00ffcc;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}

/* SECTION */
.section {
  padding: 100px 20px;
  text-align: center;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#home">Home</a>
  <a href="#features">Features</a>
  <a href="#contact">Contact</a>
</div>

<div id="home" class="hero">
  <h1>3D NFT Experience 🚀</h1>
  <p>Interactive futuristic website</p>
  <button class="btn" onclick="alert('Welcome!')">Enter</button>
</div>

<div id="features" class="section">
  <h2>Features</h2>
  <p>🔥 3D Interactive Character</p>
  <p>⚡ Smooth UI</p>
  <p>📱 Mobile Ready</p>
</div>

<div id="contact" class="section">
  <h2>Contact</h2>
  <button class="btn" onclick="contact()">Message Me</button>
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ alpha: true });

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// NFT STYLE OBJECT (GEOMETRIC CHARACTER)
let geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
let material = new THREE.MeshStandardMaterial({
  color: 0x00ffcc,
  metalness: 0.8,
  roughness: 0.2
});
let nft = new THREE.Mesh(geometry, material);
scene.add(nft);

// LIGHT
let light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z = 4;

// MOUSE MOVE INTERACTION
document.addEventListener("mousemove", (event) => {
  let x = (event.clientX / window.innerWidth) * 2 - 1;
  let y = -(event.clientY / window.innerHeight) * 2 + 1;

  nft.rotation.x = y;
  nft.rotation.y = x;
});

// ANIMATION
function animate() {
  requestAnimationFrame(animate);
  nft.rotation.z += 0.01;
  renderer.render(scene, camera);
}
animate();

// CONTACT BUTTON
function contact() {
  window.location.href = "https://wa.me/";
}
</script>

</body>
</html>
