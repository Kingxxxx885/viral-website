<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 3D Experience</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* NAV */
.navbar {
  position: fixed;
  width: 100%;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.5);
  z-index: 10;
}

.navbar a {
  color: white;
  margin: 10px;
  text-decoration: none;
}

/* SECTIONS */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

h1 {
  font-size: 2.5em;
}

.btn {
  padding: 12px 25px;
  background: cyan;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</div>

<div id="home" class="section">
  <h1>3D Web Experience 🚀</h1>
  <button class="btn">Explore</button>
</div>

<div id="about" class="section">
  <h1>Interactive NFT World</h1>
  <p>Scroll to see animation</p>
</div>

<div id="contact" class="section">
  <h1>Contact</h1>
  <button class="btn" onclick="contact()">Hire Me</button>
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// MULTIPLE OBJECTS (LIKE WEB3 STYLE)
let objects = [];

for (let i = 0; i < 5; i++) {
  let geo = new THREE.IcosahedronGeometry(1);
  let mat = new THREE.MeshStandardMaterial({
    color: Math.random() * 0xffffff,
    metalness: 0.7,
    roughness: 0.2
  });

  let mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(Math.random()*5-2.5, Math.random()*5-2.5, Math.random()*-5);
  scene.add(mesh);
  objects.push(mesh);
}

camera.position.z = 5;

// SCROLL EFFECT
window.addEventListener("scroll", () => {
  let scroll = window.scrollY;

  camera.position.z = 5 + scroll * 0.01;

  objects.forEach(obj => {
    obj.rotation.x += 0.01;
    obj.rotation.y += 0.01;
  });
});

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  objects.forEach(obj => {
    obj.rotation.x += 0.005;
    obj.rotation.y += 0.005;
  });

  renderer.render(scene, camera);
}
animate();

// CONTACT
function contact() {
  window.location.href = "https://wa.me/639XXXXXXXXX";
}
</script>

</body>
</html>
