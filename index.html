<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon New Year</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00c1;
            --neon-gold: #ffcc00;
            --bg-dark: #020617;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        /* --- GLOWING TEXT --- */
        .title-container {
            position: absolute;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            transform-style: preserve-3d;
            animation: floatText 4s ease-in-out infinite;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            color: #fff;
            /* Infinite Blinking & Glowing Effect */
            text-shadow: 
                0 0 10px #fff,
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-pink),
                0 0 80px var(--neon-cyan);
            animation: neonBlink 1.5s infinite alternate;
        }

        @keyframes neonBlink {
            0% { opacity: 0.8; filter: brightness(1); transform: scale(1); }
            100% { opacity: 1; filter: brightness(1.8); transform: scale(1.05); }
        }

        @keyframes floatText {
            0%, 100% { transform: translateZ(50px) translateY(0); }
            50% { transform: translateZ(100px) translateY(-20px); }
        }

        /* --- 3D SCENE --- */
        .scene {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }

        .firework {
            position: absolute;
            width: 0; height: 0;
            transform-style: preserve-3d;
            animation: burst 4s infinite linear;
        }

        @keyframes burst {
            0% { transform: translate3d(var(--x), var(--y), -800px) scale(0); opacity: 0; }
            10% { opacity: 1; }
            45% { transform: translate3d(var(--x), var(--y), 0) scale(1.2); }
            100% { transform: translate3d(var(--x), var(--y), 400px) scale(1.5); opacity: 0; }
        }

        .spark {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--color);
            box-shadow: 0 0 10px var(--color), 0 0 20px #fff;
            animation: spark-fade 4s infinite linear;
        }

        @keyframes spark-fade {
            0%, 40% { opacity: 1; transform: translate3d(0,0,0); }
            100% { opacity: 0; transform: translate3d(var(--dx), var(--dy), var(--dz)); }
        }

        .hint {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>Happy New Year</h1>
    </div>

    <div class="scene" id="scene"></div>

    <p class="hint">TAP TO LAUNCH FIREWORKS</p>

    <script>
        const scene = document.getElementById('scene');
        const colors = ['#00f2ff', '#ff00c1', '#39ff14', '#ffcc00', '#ff4d4d'];

        // Function to create a firework
        function createFirework(xPos, yPos, isManual = false) {
            const fw = document.createElement('div');
            fw.className = 'firework';
            
            // Random or specific position
            const x = xPos || (Math.random() * window.innerWidth - window.innerWidth / 2);
            const y = yPos || (Math.random() * window.innerHeight - window.innerHeight / 2);
            const color = colors[Math.floor(Math.random() * colors.length)];

            fw.style.setProperty('--x', `${x}px`);
            fw.style.setProperty('--y', `${y}px`);
            fw.style.setProperty('--color', color);

            // Generate 40 sparks
            for (let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                
                const angle = Math.random() * Math.PI * 2;
                const elevation = (Math.random() - 0.5) * Math.PI;
                const dist = 100 + Math.random() * 150;

                const dx = Math.cos(angle) * Math.cos(elevation) * dist;
                const dy = Math.sin(angle) * Math.cos(elevation) * dist;
                const dz = Math.sin(elevation) * dist;

                spark.style.setProperty('--dx', `${dx}px`);
                spark.style.setProperty('--dy', `${dy}px`);
                spark.style.setProperty('--dz', `${dz}px`);
                
                fw.appendChild(spark);
            }

            scene.appendChild(fw);

            // Remove manual fireworks after animation
            if (isManual) {
                setTimeout(() => fw.remove(), 4000);
            }
        }

        // Auto-launch 5 background fireworks
        for(let i=0; i<5; i++) {
            setTimeout(() => createFirework(), i * 800);
        }

        // Manual Launch on Click/Tap
        document.addEventListener('mousedown', (e) => {
            const x = e.clientX - window.innerWidth / 2;
            const y = e.clientY - window.innerHeight / 2;
            createFirework(x, y, true);
        });

        // 3D Rotation with Mouse
        document.addEventListener('mousemove', (e) => {
            const xRot = (window.innerHeight / 2 - e.pageY) / 25;
            const yRot = (e.pageX - window.innerWidth / 2) / 25;
            scene.style.transform = `rotateX(${xRot}deg) rotateY(${yRot}deg)`;
        });
    </script>
</body>
</html>
