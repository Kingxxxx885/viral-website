<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Electric Atom</title>
    <style>
        :root {
            --core-glow: #fff;
            --electron-cyan: #00f2ff;
            --electron-purple: #bc13fe;
            --electron-green: #39ff14;
            --bg-color: #020617;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Courier New', monospace;
        }

        /* THE ATOM CONTAINER */
        .atom {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* NUCLEUS (The Core) */
        .nucleus {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            margin: -20px;
            background: var(--core-glow);
            border-radius: 50%;
            box-shadow: 
                0 0 20px #fff,
                0 0 50px var(--electron-cyan),
                0 0 100px var(--electron-purple);
            animation: electricity 0.2s infinite alternate;
            z-index: 10;
        }

        @keyframes electricity {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.1); filter: brightness(2); box-shadow: 0 0 30px #fff, 0 0 60px cyan; }
        }

        /* ELECTRON ORBITS */
        .orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .orbit-1 { transform: rotateY(70deg) rotateX(20deg); }
        .orbit-2 { transform: rotateY(-70deg) rotateX(20deg); }
        .orbit-3 { transform: rotateX(90deg); }

        /* ELECTRONS */
        .electron {
            position: absolute;
            top: 50%;
            width: 12px;
            height: 12px;
            margin-top: -6px;
            border-radius: 50%;
            animation: rotate 3s infinite linear;
        }

        .e1 { background: var(--electron-cyan); box-shadow: 0 0 15px var(--electron-cyan); animation-duration: 2s; }
        .e2 { background: var(--electron-purple); box-shadow: 0 0 15px var(--electron-purple); animation-duration: 2.5s; }
        .e3 { background: var(--electron-green); box-shadow: 0 0 15px var(--electron-green); animation-duration: 1.8s; }

        @keyframes rotate {
            from { transform: rotate(0deg) translateX(150px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
        }

        /* ELECTRIC BARK/SPARKS */
        .spark {
            position: absolute;
            width: 2px;
            height: 40px;
            background: var(--electron-cyan);
            opacity: 0;
            animation: spark-flash 0.5s infinite;
        }

        @keyframes spark-flash {
            0% { opacity: 0; transform: rotate(var(--r)) translateY(0); }
            50% { opacity: 1; transform: rotate(var(--r)) translateY(-100px); }
            100% { opacity: 0; }
        }

        /* UI TEXT */
        .label {
            position: absolute;
            bottom: 50px;
            color: var(--electron-cyan);
            text-align: center;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--electron-cyan);
        }
    </style>
</head>
<body>

    <div class="atom" id="atom">
        <div class="nucleus"></div>
        
        <div class="orbit orbit-1">
            <div class="electron e1"></div>
        </div>
        
        <div class="orbit orbit-2">
            <div class="electron e2"></div>
        </div>
        
        <div class="orbit orbit-3">
            <div class="electron e3"></div>
        </div>

        <div class="spark" style="--r: 45deg; top:50%; left:50%;"></div>
        <div class="spark" style="--r: 135deg; top:50%; left:50%;"></div>
        <div class="spark" style="--r: 225deg; top:50%; left:50%;"></div>
        <div class="spark" style="--r: 315deg; top:50%; left:50%;"></div>
    </div>

    <div class="label"><h1>QUANTUM CORE ACTIVE</h1></div>

    <script>
        const atom = document.getElementById('atom');

        // Movable interaction
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 15;
            const y = (window.innerHeight / 2 - e.pageY) / 15;
            atom.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // Mobile touch interaction
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const x = (window.innerWidth / 2 - touch.pageX) / 10;
            const y = (window.innerHeight / 2 - touch.pageY) / 10;
            atom.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
