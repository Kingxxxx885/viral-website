<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Website Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  scroll-behavior: smooth;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.7);
  padding: 15px;
  text-align: center;
}
.navbar a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
  background: linear-gradient(135deg, #3b82f6, #9333ea);
}
.btn {
  padding: 12px 25px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}
.card {
  background: rgba(255,255,255,0.05);
  margin: 10px;
  padding: 20px;
  border-radius: 15px;
  display: inline-block;
  width: 250px;
}

/* FOOTER */
.footer {
  padding: 20px;
  text-align: center;
  background: #020617;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#home">Home</a>
  <a href="#features">Features</a>
  <a href="#pricing">Pricing</a>
  <a href="#contact">Contact</a>
</div>

<!-- HERO -->
<div id="home" class="hero">
  <h1>Build Something Viral 🚀</h1>
  <p>Create modern websites that convert and trend.</p>
  <button class="btn" onclick="scrollToSection('pricing')">Get Started</button>
</div>

<!-- FEATURES -->
<div id="features" class="section">
  <h2>Features</h2>
  <div class="card">⚡ Fast Performance</div>
  <div class="card">🎨 Modern UI</div>
  <div class="card">📱 Mobile Ready</div>
</div>

<!-- PRICING -->
<div id="pricing" class="section">
  <h2>Pricing</h2>
  <div class="card">Basic - $10</div>
  <div class="card">Pro - $25</div>
  <div class="card">Premium - $50</div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h2>Contact</h2>
  <p>Click button to contact us</p>
  <button class="btn" onclick="contact()">Message Us</button>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Viral Website Pro
</div>

<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView();
}

function contact() {
  alert("Contact feature coming soon!");
}
</script>

</body>
</html>
