<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Neon Fireworks</title>
    <style>
        :root {
            --fw-color-1: #00f2ff; /* Cyan */
            --fw-color-2: #ff00c1; /* Pink */
            --fw-color-3: #39ff14; /* Green */
            --fw-color-4: #fff01f; /* Yellow */
            --bg-color: #020617;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 3D SCENE CONTAINER */
        .scene {
            width: 300px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* FIREWORK PARENT */
        .firework {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            animation: burst 4s infinite linear;
        }

        /* Create 4 distinct fireworks in different positions & times */
        .fw-1 { --r: 0deg; --x: -100px; --y: -50px; --color: var(--fw-color-1); animation-delay: 0s; }
        .fw-2 { --r: 90deg; --x: 100px; --y: 50px; --color: var(--fw-color-2); animation-delay: 1s; }
        .fw-3 { --r: 180deg; --x: -50px; --y: 100px; --color: var(--fw-color-3); animation-delay: 2s; }
        .fw-4 { --r: 270deg; --x: 50px; --y: -100px; --color: var(--fw-color-4); animation-delay: 3s; }

        @keyframes burst {
            0% { transform: translate3d(var(--x), var(--y), -1000px) scale(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translate3d(var(--x), var(--y), 0) scale(1.5); }
            100% { transform: translate3d(var(--x), var(--y), 500px) scale(2); opacity: 0; }
        }

        /* FIREWORK SPARKS */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--color);
            box-shadow: 0 0 10px var(--color), 0 0 20px #fff;
            animation: spark-fade 4s infinite linear;
            animation-delay: inherit;
        }

        @keyframes spark-fade {
            0%, 50% { opacity: 1; transform: scale(1) translate3d(0, 0, 0); }
            100% { opacity: 0; transform: scale(0) translate3d(var(--dx), var(--dy), var(--dz)); }
        }

        /* UI TEXT */
        .label {
            position: absolute;
            bottom: 50px;
            color: white;
            text-align: center;
            letter-spacing: 5px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="firework fw-1" id="fw1"></div>
        <div class="firework fw-2" id="fw2"></div>
        <div class="firework fw-3" id="fw3"></div>
        <div class="firework fw-4" id="fw4"></div>
    </div>

    <div class="label">INFINITY PROTOCOL: FIREWORKS</div>

    <script>
        const scene = document.getElementById('scene');

        // Create 30 sparks for each firework burst
        function createSparks(fwId) {
            const fw = document.getElementById(fwId);
            for (let i = 0; i < 30; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                
                // Random 3D direction for each spark
                const angle = Math.random() * Math.PI * 2; // Full circle
                const elevation = (Math.random() - 0.5) * Math.PI; // Up/Down

                // Random burst distance
                const distance = 150 + Math.random() * 100;

                // Calculate X, Y, Z translation
                const dx = Math.cos(angle) * Math.cos(elevation) * distance;
                const dy = Math.sin(angle) * Math.cos(elevation) * distance;
                const dz = Math.sin(elevation) * distance;

                // Set as CSS variables
                spark.style.setProperty('--dx', `${dx}px`);
                spark.style.setProperty('--dy', `${dy}px`);
                spark.style.setProperty('--dz', `${dz}px`);

                fw.appendChild(spark);
            }
        }

        // Initialize sparks for all 4 fireworks
        createSparks('fw1');
        createSparks('fw2');
        createSparks('fw3');
        createSparks('fw4');

        // Movable interaction
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // Mobile touch interaction
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const x = (window.innerWidth / 2 - touch.pageX) / 10;
            const y = (window.innerHeight / 2 - touch.pageY) / 10;
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
