<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Humanoid Web3 Site</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #9333ea);
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  width: 100%;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.5);
  z-index: 10;
}
.navbar a {
  color: white;
  margin: 15px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.hero h1 {
  font-size: 2.5em;
}

.btn {
  padding: 12px 25px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* SECTIONS */
.section {
  padding: 100px 20px;
  text-align: center;
}

.card {
  display: inline-block;
  width: 260px;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.3s;
}
.card:hover {
  transform: scale(1.05);
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <a href="#home">Home</a>
  <a href="#features">Features</a>
  <a href="#nft">NFT</a>
  <a href="#contact">Contact</a>
</div>

<!-- HERO -->
<div id="home" class="hero">
  <h1>Humanoid 3D Experience 🤖</h1>
  <p>Futuristic Web3 Website</p>
  <button class="btn" onclick="scrollToSection('features')">Explore</button>
</div>

<!-- FEATURES -->
<div id="features" class="section">
  <h2>Features</h2>

  <div class="card" onclick="alert('Fast Performance')">⚡ Fast</div>
  <div class="card" onclick="alert('3D Experience')">🎮 3D UI</div>
  <div class="card" onclick="alert('Mobile Ready')">📱 Mobile</div>

</div>

<!-- NFT SECTION -->
<div id="nft" class="section">
  <h2>Our NFT Collection</h2>

  <div class="card" onclick="alert('NFT #1')">🧍 NFT Alpha</div>
  <div class="card" onclick="alert('NFT #2')">🧍 NFT Beta</div>
  <div class="card" onclick="alert('NFT #3')">🧍 NFT Gamma</div>

</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h2>Contact Me</h2>
  <button class="btn" onclick="contact()">Hire Me</button>
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 3;

// LOAD HUMANOID MODEL
let loader = new THREE.GLTFLoader();
let model;

loader.load(
  "https://modelviewer.dev/shared-assets/models/RobotExpressive.glb",
  function(gltf) {
    model = gltf.scene;
    scene.add(model);
    model.scale.set(1.5,1.5,1.5);
  }
);

// INTERACTION
document.addEventListener("mousemove", (e) => {
  if (model) {
    model.rotation.y = e.clientX * 0.002;
    model.rotation.x = e.clientY * 0.002;
  }
});

// MOBILE TOUCH
document.addEventListener("touchmove", (e) => {
  if (model) {
    let t = e.touches[0];
    model.rotation.y = t.clientX * 0.002;
    model.rotation.x = t.clientY * 0.002;
  }
});

// ANIMATION LOOP
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y += 0.003;
    model.position.y = Math.sin(Date.now()*0.002) * 0.1;
  }

  renderer.render(scene, camera);
}
animate();

// SCROLL FUNCTION
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}

// CONTACT
function contact() {
  window.location.href = "https://wa.me/639XXXXXXXXX";
}
</script>

</body>
</html>
