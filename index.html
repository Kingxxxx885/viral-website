<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cyber-Guardian</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020617;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px; /* Gives the 3D depth */
            font-family: 'Courier New', monospace;
        }

        /* INSTRUCTIONS UI */
        .ui {
            position: absolute;
            top: 20px;
            color: var(--neon-cyan);
            text-align: center;
            text-shadow: 0 0 10px var(--neon-cyan);
            z-index: 100;
        }

        /* 3D SCENE CONTAINER */
        .scene {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* BASE CUBE DESIGN */
        .cube {
            position: absolute;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid var(--neon-cyan);
            box-shadow: inset 0 0 20px var(--neon-cyan), 0 0 15px var(--neon-cyan);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CHARACTER COMPONENTS */
        
        /* Head */
        .head { width: 60px; height: 60px; top: -70px; left: 70px; }
        .head .face { width: 60px; height: 60px; }
        .eye { 
            width: 15px; height: 5px; background: var(--neon-purple); 
            box-shadow: 0 0 15px var(--neon-purple);
            animation: blink 3s infinite;
        }

        /* Body */
        .body-main { width: 100px; height: 120px; top: 0; left: 50px; }
        .body-main .face { width: 100px; height: 120px; border-color: var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }

        /* Positioning Faces for 3D */
        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* Adjusted for Body Width */
        .body-main .front  { transform: rotateY(0deg) translateZ(50px); }
        .body-main .back   { transform: rotateY(180deg) translateZ(50px); }
        .body-main .right  { transform: rotateY(90deg) translateZ(50px); }
        .body-main .left   { transform: rotateY(-90deg) translateZ(50px); }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0); }
        }

        /* FLOOR GLOW */
        .floor {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            transform: rotateX(90deg) translateZ(-150px);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1>CYBER-GUARDIAN v1.0</h1>
        <p>MOVE MOUSE TO ROTATE CHARACTER</p>
    </div>

    <div class="scene" id="scene">
        <div class="floor"></div>

        <div class="cube head">
            <div class="face front"><div class="eye"></div></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>

        <div class="cube body-main">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');

        document.addEventListener('mousemove', (e) => {
            // Calculate rotation based on mouse position
            const xAxis = (window.innerWidth / 2 - e.pageX) / 10;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 10;

            // Apply rotation to the scene
            scene.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Touch support for mobile
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const xAxis = (window.innerWidth / 2 - touch.pageX) / 5;
            const yAxis = (window.innerHeight / 2 - touch.pageY) / 5;
            scene.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
