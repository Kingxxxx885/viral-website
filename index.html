<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Pro Website</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #9333ea);
  color: white;
}

.navbar {
  position: fixed;
  width: 100%;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.6);
}
.navbar a {
  color: white;
  margin: 10px;
  text-decoration: none;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.btn {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
}

/* canvas fix */
canvas {
  display: block;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#home">Home</a>
  <a href="#contact">Contact</a>
</div>

<div id="home" class="section">
  <h1>3D Website 🚀</h1>
  <button class="btn" onclick="contact()">Hire Me</button>
</div>

<div id="contact" class="section">
  <h1>Contact</h1>
</div>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 3;

// LIGHT
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// TRY LOAD MODEL
let loader = new THREE.GLTFLoader();
let model;

loader.load(
  "https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf",
  function(gltf) {
    model = gltf.scene;
    scene.add(model);
  },
  undefined,
  function(error) {
    console.log("Model failed, using fallback");

    // fallback cube
    let geo = new THREE.BoxGeometry();
    let mat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
    model = new THREE.Mesh(geo, mat);
    scene.add(model);
  }
);

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y += 0.01;
  }

  renderer.render(scene, camera);
}
animate();

// RESPONSIVE FIX
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// CONTACT
function contact() {
  window.location.href = "https://wa.me/639XXXXXXXXX";
}
</script>

</body>
</html>
